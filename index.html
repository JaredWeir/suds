<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinema &amp; Suds — Now Showing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0b; --panel:#141210; --edge:#241e16;
    --fg:#ECE7DE; --muted:#8c8378; --soft:#cfc7ba; --gold:#E7B24C;
    --panelW:clamp(290px,24vw,440px);
    --pad:clamp(22px,2.3vw,40px);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;width:100%;overflow:hidden;background:var(--bg)}
  body{font-family:"Inter",system-ui,sans-serif;color:var(--fg);display:flex;-webkit-font-smoothing:antialiased}

  /* ===== Stage: movie maximized top-to-bottom ===== */
  .stage{flex:1;height:100vh;position:relative;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .stage video{width:100%;height:100%;object-fit:contain;display:block;background:#000}

  .sound{position:absolute;right:16px;bottom:14px;z-index:6;width:40px;height:40px;border:0;border-radius:50%;
    background:rgba(20,18,16,.5);color:var(--gold);font-size:16px;cursor:pointer;opacity:.3;transition:opacity .2s;
    display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
  .sound:hover{opacity:1}

  /* ===== Loading / intermission card over the stage ===== */
  .loading{position:absolute;inset:0;z-index:4;display:none;flex-direction:column;align-items:center;justify-content:center;
    gap:clamp(14px,2.2vh,26px);background:radial-gradient(120% 90% at 50% 42%, #161009 0%, #000 78%);text-align:center;padding:6vh}
  .loading.show{display:flex}
  .load-logo{height:clamp(70px,13vh,150px);width:auto;opacity:.97}
  .spinner{width:clamp(26px,3vh,38px);height:clamp(26px,3vh,38px);border-radius:50%;
    border:3px solid rgba(231,178,76,.22);border-top-color:var(--gold);animation:spin 1s linear infinite}
  .loading.offline .spinner{display:none}
  @keyframes spin{to{transform:rotate(360deg)}}
  .load-title{font-family:"Oswald",sans-serif;font-weight:500;letter-spacing:.26em;text-indent:.26em;text-transform:uppercase;
    font-size:clamp(13px,1.5vw,20px);color:var(--gold)}
  .load-sub{font-size:clamp(12px,1.3vw,17px);color:var(--muted);max-width:40ch;line-height:1.5}

  /* ===== Side panel ===== */
  .panel{width:var(--panelW);height:100vh;flex:none;background:var(--panel);border-left:1px solid var(--edge);
    display:flex;flex-direction:column;padding:var(--pad);gap:clamp(18px,2.3vh,30px)}
  .brand-logo{height:clamp(58px,7.4vh,104px);width:auto;display:block}
  .eyebrow{display:flex;align-items:center;gap:9px;font-family:"Oswald",sans-serif;font-weight:500;
    text-transform:uppercase;letter-spacing:.24em;font-size:clamp(10px,1vw,13px);color:var(--gold);margin-bottom:14px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:pulse 2.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(231,178,76,.5)}70%{box-shadow:0 0 0 9px rgba(231,178,76,0)}100%{box-shadow:0 0 0 0 rgba(231,178,76,0)}}
  .np-title{font-family:"Oswald",sans-serif;font-weight:600;line-height:1.03;font-size:clamp(26px,3.3vw,52px)}
  .np-meta{margin-top:11px;font-size:clamp(13px,1.2vw,19px);color:var(--fg);opacity:.8;font-weight:500}
  .np-note{margin-top:14px;font-size:clamp(13px,1.1vw,17px);line-height:1.5;color:var(--muted);max-width:34ch}
  .trivia{border-top:1px solid var(--edge);padding-top:clamp(16px,2vh,24px)}
  .trivia-label{font-family:"Oswald",sans-serif;text-transform:uppercase;letter-spacing:.2em;
    font-size:clamp(9px,.9vw,12px);color:var(--muted);margin-bottom:9px}
  .trivia-text{font-size:clamp(12px,1.05vw,16px);line-height:1.55;color:var(--soft);transition:opacity .5s}
  .trivia-text.fade{opacity:0}
  .trivia-text b{color:var(--gold);font-weight:600}
  .foot{margin-top:auto;display:flex;align-items:flex-end;justify-content:space-between;gap:12px;
    border-top:1px solid var(--edge);padding-top:clamp(14px,1.8vh,22px)}
  .clock{display:flex;flex-direction:column;line-height:1.1}
  .clock .t{font-family:"Oswald",sans-serif;font-weight:500;font-size:clamp(16px,1.6vw,24px);letter-spacing:.02em}
  .clock .d{font-size:clamp(9px,.85vw,12px);color:var(--muted);text-transform:uppercase;letter-spacing:.14em;margin-top:4px}
  .weir{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
  .weir .since{font-size:clamp(9px,.85vw,12px);color:var(--muted);font-style:italic}
  .weir img{height:clamp(20px,2.3vh,34px);width:auto;display:block;filter:brightness(0) invert(1) opacity(.9)}

  @media (max-width:820px){
    body{flex-direction:column}
    .stage{height:58vh;flex:none}
    .panel{width:100%;height:auto;flex:1;border-left:0;border-top:1px solid var(--edge)}
  }
  @media (prefers-reduced-motion:reduce){ .dot,.spinner{animation:none} .trivia-text,video{transition:none} }
</style>
</head>

  {t:"Royal Wedding",        y:1951, dir:"Stanley Donen",      note:"Astaire dancing on the ceiling, in color",     id:"royal_wedding",          f:"royal_wedding.mp4"},
  {t:"Angel and the Badman", y:1947, dir:"James Edward Grant", note:"A gentle John Wayne western",                  id:"angel_and_the_badman",   f:"angel_and_the_badman.mp4"},
  {t:"McLintock!",           y:1963, dir:"Andrew V. McLaglen", note:"Wayne & O'Hara, Technicolor comedy western",   id:"mc-lintock-1963_202606", f:"McLintock!_(1963).mp4"},
  {t:"The Man Who Knew Too Much", y:1934, dir:"Alfred Hitchcock", note:"The original — mild suspense finale",       id:"the-man-who-knew-too-much-1934", f:"The Man Who Knew Too Much (1934).mp4"},
  {t:"The Front Page",       y:1931, dir:"Lewis Milestone",    note:"The newspaper comedy that started it all",     id:"TheFrontPage1931AdolpheMenjouPatOBrienLewismiles", f:"TheFrontPage1931AdolpheMenjouPatOBrienLewismiles.mp4"},
];

const FACTS = [
  "This building was <b>Cinema and Suds</b>, a dine-in movie theater that opened October 22, 1985 — right here at 4450 Fashion Square Boulevard.",
  "At Cinema and Suds you watched second-run movies from a <b>table</b> while waiters brought you food and a cold beer.",
  "Decades before Alamo Drafthouse and Emagine made it a national trend, Cinema and Suds was one of only a <b>handful of dine-in theaters</b> in the country.",
  "Locals still remember catching films like <b>Backdraft</b> (1991) and <b>Cool Runnings</b> (1993) on these very screens.",
  "When the last reel ran out around 1994, the theater became a conference center — and later, this surgery center.",
  "Every film on this screen is a genuine classic from the <b>golden age of Hollywood</b> — the same era this room was built to celebrate.",
  "The reels are gone, but the marquee lives on. <b>Welcome back to Cinema and Suds.</b>",
];

/* ---------- elements ---------- */
const vid=document.getElementById('vid');
const npTitle=document.getElementById('npTitle'), npMeta=document.getElementById('npMeta'), npNote=document.getElementById('npNote');
const loadingEl=document.getElementById('loading'), loadTitle=document.getElementById('loadTitle'), loadSub=document.getElementById('loadSub');
const sBtn=document.getElementById('soundBtn');
const factEl=document.getElementById('fact');

function showLoading(title,sub,offline){
  loadTitle.textContent=title; loadSub.innerHTML=sub;
  loadingEl.classList.toggle('offline', !!offline);
  loadingEl.classList.add('show');
}
function hideLoading(){ loadingEl.classList.remove('show','offline'); }

/* ---------- playlist ---------- */
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
let order=shuffle(PLAYLIST), idx=0, fails=0, current=order[0];
function urlFor(film){ return "https://archive.org/download/"+film.id+"/"+encodeURIComponent(film.f); }

function setHeader(film){
  npTitle.textContent=film.t;
  npMeta.textContent=film.y+"   ·   dir. "+film.dir;
  npNote.textContent=film.note;
}
function load(i){
  const film=order[i%order.length]; current=film;
  setHeader(film);
  showLoading("Loading", film.t+" &nbsp;·&nbsp; "+film.y);
  vid.src=urlFor(film);
  vid.load();
  const p=vid.play(); if(p&&p.catch) p.catch(()=>{});
}
function next(){ idx=(idx+1)%order.length; if(idx===0) order=shuffle(PLAYLIST); load(idx); }

vid.addEventListener('playing', ()=>{ fails=0; hideLoading(); tryAutoSound(); });
vid.addEventListener('canplay', ()=>{ hideLoading(); });
vid.addEventListener('waiting', ()=>{ showLoading("Buffering", current.t+" &nbsp;·&nbsp; "+current.y); });
vid.addEventListener('stalled', ()=>{ showLoading("Buffering", current.t+" &nbsp;·&nbsp; "+current.y); });
vid.addEventListener('ended', ()=>{ fails=0; next(); });
vid.addEventListener('error', ()=>{
  fails++;
  if(fails>=order.length){
    showLoading("Intermission","Reconnecting to the projection booth &mdash; make sure the screen is online. The next feature will begin automatically.", true);
    setTimeout(()=>{ fails=0; next(); }, 12000);
  } else { next(); }
});
/* skip a film only if it has been stuck with no progress for ~45s while supposedly playing */
let lastTime=0, stalls=0;
setInterval(()=>{
  if(vid.readyState>=2 && !vid.paused){
    if(vid.currentTime===lastTime){ stalls++; if(stalls>18){ stalls=0; next(); } } else stalls=0;
    lastTime=vid.currentTime;
  }
},2500);

/* ---------- sound ---------- */
sBtn.addEventListener('click',()=>{
  vid.muted=!vid.muted;
  sBtn.textContent=vid.muted?'🔇':'🔊';
  if(!vid.muted){ const p=vid.play(); if(p&&p.catch)p.catch(()=>{}); }
});
let autoSoundTried=false;
function tryAutoSound(){
  if(autoSoundTried) return; autoSoundTried=true;
  vid.muted=false; sBtn.textContent='🔊';
  const p=vid.play();
  if(p&&p.catch){ p.catch(()=>{ vid.muted=true; sBtn.textContent='🔇'; const q=vid.play(); if(q&&q.catch)q.catch(()=>{}); }); }
}

/* ---------- clock ---------- */
function tick(){
  const d=new Date(); let h=d.getHours(), m=d.getMinutes();
  const ap=h>=12?'PM':'AM'; h=h%12||12;
  document.getElementById('clkT').textContent=h+':'+String(m).padStart(2,'0')+' '+ap;
  document.getElementById('clkD').textContent=d.toLocaleDateString(undefined,{weekday:'long', month:'short', day:'numeric'});
}
tick(); setInterval(tick,15000);

/* ---------- trivia rotation ---------- */
let fi=0;
factEl.innerHTML=FACTS[0]; fi=1;
setInterval(()=>{
  factEl.classList.add('fade');
  setTimeout(()=>{ factEl.innerHTML=FACTS[fi%FACTS.length]; fi++; factEl.classList.remove('fade'); }, 500);
}, 13000);

/* ---------- go ---------- */
load(0);
</script>
